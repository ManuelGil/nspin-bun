version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    target-branch: "main"

    schedule:
      interval: "cron"
      cronjob: "0 3 */14 * *"

    open-pull-requests-limit: 2

    rebase-strategy: "auto"

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"
      include: "scope"

    ignore:
      # Major updates should be reviewed manually
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"

    target-branch: "main"

    schedule:
      interval: "cron"
      cronjob: "0 3 */14 * *"

    open-pull-requests-limit: 2

    rebase-strategy: "auto"

    labels:
      - "github-actions"

    commit-message:
      prefix: "ci"
      include: "scope"

    groups:
      github-actions:
        patterns:
          - "*"
